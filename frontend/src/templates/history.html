<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PrepMed - Medical Records Index</title>
    <style>
        body { font-family: monospace; padding: 20px; color: #000; background: #fff; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; }
        .add-btn { background: #000; color: #fff; padding: 8px 16px; text-decoration: none; font-weight: bold; border: 1px solid #000; }
        .add-btn:hover { background: #fff; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; }
        th { background: #f0f0f0; }
        .action-link { color: #000; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <h1>📋 Medical Records Archive Index</h1>
    
    <div class="controls">
        <a href="/record" class="add-btn">+ ADD NEW MEDICAL RECORD</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Session ID</th>
                <th>Patient ID</th>
                <th>Status</th>
                <th>Created Timestamp</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="recordsTableBody">
            <tr>
                <td colspan="5" style="text-align: center; font-style: italic;">Loading operational database logs...</td>
            </tr>
        </tbody>
    </table>

    <script>
        const BACKEND_URL = "{{ backend_url }}";

                async function fetchAllConsultations() {
            try {
                // FIXED: Changed endpoint URL target string from /api/nurse/queue to /api/sessions
                const response = await fetch(`${BACKEND_URL}/api/sessions`); 
                if (!response.ok) throw new Error("Could not read records database table.");
                const data = await response.json();
                
                const tableBody = document.getElementById('recordsTableBody');
                tableBody.innerHTML = "";

                if (data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No records stored inside database currently. Click add button to start.</td></tr>`;
                    return;
                }

                data.forEach(item => {
                    const row = document.createElement('tr');
                    
                    // FIXED: Aligned template property names with backend model keys exactly
                    row.innerHTML = `
                        <td>${item.id}</td>
                        <td>Patient Index #${item.patient_id}</td>
                        <td><strong>${item.status.toUpperCase()}</strong></td>
                        <td>${item.created_at ? new Date(item.created_at).toLocaleDateString() : '-'}</td>
                        <td><a href="/detail/${item.id}" class="action-link">View Detail Report</a></td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (err) {
                document.getElementById('recordsTableBody').innerHTML = `<tr><td colspan="5" style="color:red; text-align:center;">Error matching PostgreSQL streams: ${err.message}</td></tr>`;
            }
        }

        window.addEventListener('DOMContentLoaded', fetchAllConsultations);
    </script>
</body>
</html>
