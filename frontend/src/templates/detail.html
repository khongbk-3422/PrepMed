<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PrepMed - Record Metrics Validation Engine</title>
    <style>
        body { font-family: monospace; padding: 20px; color: #000; background: #fff; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        .meta-info { margin: 15px 0; font-size: 14px; border: 1px dashed #000; padding: 10px; width: fit-content; }
        .row { margin: 20px 0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        textarea, input[type="text"] { border: 1px solid #000; padding: 8px; width: 100%; max-width: 600px; font-family: monospace; display: block; box-sizing: border-box; }
        .dynamic-container { background: #fcfcfc; padding: 15px; border: 1px solid #000; margin-top: 15px; max-width: 600px; }
        .btn-group { border-top: 2px solid #000; padding-top: 15px; margin-top: 25px; }
        .btn { border: 1px solid #000; padding: 8px 16px; font-family: monospace; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .btn-save { background: #fff; color: #000; }
        .btn-confirm { background: #000; color: #fff; }
        .back-link { color: #000; display: block; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>📝 Medical Report Workspace</h1>
    <a href="/" class="back-link">⬅ Back to Records Table Index</a>

    <div class="meta-info">
        <strong>Session Document Reference Key:</strong> ID #<span id="consultationIdDisplay">${consultationId}</span><br>
        <strong>Current Document Audit Status:</strong> [<span id="statusDisplay">Loading...</span>]
    </div>

    <!-- User Audit Review Target Form Matrix -->
    <div class="row">
        <label>Clinical Summary Analysis (Description)</label>
        <textarea id="outputDesc" rows="4" placeholder="-"></textarea>
    </div>

    <div class="row">
        <label>Prescribed Drug Dosages (Medicine)</label>
        <textarea id="outputMed" rows="4" placeholder="-"></textarea>
    </div>

    <div class="row">
        <label>Custom Template Blueprint Extraction Keys</label>
        <div id="dynamicKeysContainer" class="dynamic-container">
            <span style="font-style:italic; color:#aaa;">Evaluating template structured configurations...</span>
        </div>
    </div>

    <div class="btn-group">
        <button id="saveDraftBtn" class="btn btn-save">SAVE WORKSPACE CHANGES AS DRAFT</button>
        <button id="confirmBtn" class="btn btn-confirm">LOCK & MARK CONFIRMED</button>
    </div>

    <script>
        const BACKEND_URL = "{{ backend_url }}";
        const consultationId = "{{ consultation_id }}";

        const statusDisplay = document.getElementById('statusDisplay');
        const outputDesc = document.getElementById('outputDesc');
        const outputMed = document.getElementById('outputMed');
        const dynamicKeysContainer = document.getElementById('dynamicKeysContainer');
        const saveDraftBtn = document.getElementById('saveDraftBtn');
        const confirmBtn = document.getElementById('confirmBtn');

        async function fetchRecordDetails() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/sessions/${consultationId}`);
                if (!response.ok) throw new Error("Target audit folder file missing.");
                const data = await response.json();

                // Hydrate inputs
                statusDisplay.innerText = data.status.toUpperCase();
                outputDesc.value = data.extracted_description || "-";
                outputMed.value = data.extracted_medicine || "-";

                // Read and format state closures
                if (data.status === "Confirmed") {
                    statusDisplay.style.fontWeight = "bold";
                    saveDraftBtn.disabled = true;
                    confirmBtn.disabled = true;
                    saveDraftBtn.style.opacity = 0.5;
                    confirmBtn.style.opacity = 0.5;
                }

                // Render dynamic dictionary lines inside plain inputs
                renderStructuredFields(data.extracted_structured_data);
            } catch (err) {
                alert("Failed fetching workspace parameters: " + err.message);
            }
        }

        function renderStructuredFields(structuredObj) {
            dynamicKeysContainer.innerHTML = "";
            if (!structuredObj || Object.keys(structuredObj).length === 0) {
                dynamicKeysContainer.innerHTML = `<span style="font-style:italic; color:#777;">No additional custom dictionary elements defined inside template file.</span>`;
                return;
            }

            for (const [key, value] of Object.entries(structuredObj)) {
                const containerRow = document.createElement('div');
                containerRow.style.marginBottom = "12px";
                containerRow.innerHTML = `
                    <label style="font-size:12px; font-weight:normal;" class="dynamic-key-label">${key}</label>
                    <input type="text" value="${value}" class="dynamic-value-input">
                `;
                dynamicKeysContainer.appendChild(containerRow);
            }
        }

        async function postAuditAdjustments(shouldLockConfirmed) {
            const compiledStructuredData = {};
            const keys = dynamicKeysContainer.querySelectorAll('.dynamic-key-label');
            const inputs = dynamicKeysContainer.querySelectorAll('.dynamic-value-input');
            
            keys.forEach((el, index) => {
                compiledStructuredData[el.innerText] = inputs[index].value;
            });

            const payload = {
                user_id: 1, // Fallback tracking index key parameter bind
                extracted_structured_data: compiledStructuredData,
                extracted_description: outputDesc.value,
                extracted_medicine: outputMed.value,
                mark_confirmed: shouldLockConfirmed
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/sessions/${consultationId}/review`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("PostgreSQL tracking pipeline adjustments sync failed.");
                
                alert(shouldLockConfirmed ? "✅ Report marked CONFIRMED. Long-term training vector locked offline." : "📝 Draft changes saved successfully.");
                window.location.reload(); // Reload values to match frozen state permissions
            } catch (err) {
                alert("Transaction dropped: " + err.message);
            }
        }

        saveDraftBtn.addEventListener('click', () => postAuditAdjustments(false));
        confirmBtn.addEventListener('click', () => postAuditAdjustments(true));

        window.addEventListener('DOMContentLoaded', fetchRecordDetails);
    </script>
</body>
</html>
