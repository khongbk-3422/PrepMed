<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PrepMed - Live Voice Capturing Platform</title>
    <style>
        body { font-family: monospace; padding: 20px; color: #000; background: #fff; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        .form-row { margin: 15px 0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        select, input { padding: 8px; border: 1px solid #000; width: 350px; font-family: monospace; display: block; }
        .btn { border: 1px solid #000; padding: 10px 20px; font-weight: bold; font-family: monospace; cursor: pointer; margin-right: 10px; }
        .btn-start { background: #000; color: #fff; }
        .btn-pause { background: #fff; color: #000; border: 1px dashed #000; display: none; }
        .btn-reset { background: #fff; color: #000; border: 1px solid #000; display: none; }
        .btn-stop { background: #fff; color: #000; display: none; }
        .status-container { margin: 20px 0; padding: 15px; border: 1px solid #000; background: #f9f9f9; }
        .back-link { color: #000; display: block; margin-top: 20px; }
        .live-transcript-box { width: 100%; max-width: 600px; height: 120px; border: 1px solid #000; padding: 10px; background: #fff; font-family: monospace; overflow-y: auto; margin-top: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>🎙️ Live Audio Session Workspace Controller</h1>
    <a href="/" class="back-link">⬅ Back to Records Table Index</a>

    <div class="form-row">
        <label>Select Template</label>
        <select id="templateSelect">
            <option value="1">Template 1 (Loading standard options...)</option>
        </select>
    </div>

    <div class="form-row">
        <label>Select Model Engine (Ollama or Gemini)</label>
        <select id="modelSelect">
            <option value="llama3.1">Loading available systems selection data...</option>
        </select>
    </div>

    <div class="form-row">
        <label>Patient ID Mapping Index</label>
        <input type="number" id="patientId" value="101">
    </div>

    <div class="form-row">
        <label>Doctor/User Access Key ID</label>
        <input type="number" id="userId" value="1">
    </div>

    <div class="status-container">
        <h3 style="margin-top:0;">Capture State Activity Monitor</h3>
        <p id="recordStatus">System idle. Ready to record microphone streams...</p>
        
        <label>Live Real-Time Dictation Preview:</label>
        <div id="liveTranscript" class="live-transcript-box">Words will appear here instantly as you speak...</div>

        <div style="margin-top:15px;">
            <button id="startBtn" class="btn btn-start">START LIVE RECORDING</button>
            <button id="pauseBtn" class="btn btn-pause">PAUSE RECORDING</button>
            <button id="resetBtn" class="btn btn-reset">RESET TEXT</button>
            <button id="stopBtn" class="btn btn-stop">STOP AND RUN PROCESSING ANALYTICS</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = "{{ backend_url }}";
        let recognition;
        let finalTranscript = "";
        let isPaused = false;

        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const stopBtn = document.getElementById('stopBtn');
        const recordStatus = document.getElementById('recordStatus');
        const liveTranscriptDiv = document.getElementById('liveTranscript');
        const templateSelect = document.getElementById('templateSelect');
        const modelSelect = document.getElementById('modelSelect');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("⚠️ Your browser does not support live voice dictation. Please use Google Chrome or Microsoft Edge.");
        } else {
            recognition = new SpeechRecognition();
            recognition.continuous = true;       
            recognition.interimResults = true;  
            recognition.lang = 'en-US';         

            recognition.onresult = (event) => {
                if (isPaused) return;
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                liveTranscriptDiv.innerText = finalTranscript + interimTranscript;
            };

            recognition.onerror = (event) => { recordStatus.innerText = "⚠️ Voice capture error: " + event.error; };
            recognition.onend = () => { if (!isPaused && startBtn.style.display === 'none') { recognition.start(); } };
        }

        startBtn.addEventListener('click', () => {
            if (!SpeechRecognition) return;
            finalTranscript = "";
            liveTranscriptDiv.innerText = "";
            isPaused = false;
            recognition.start();
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            resetBtn.style.display = 'inline-block';
            stopBtn.style.display = 'inline-block';
            recordStatus.innerText = "🎙️ Listening... Speak clearly into your mic now.";
        });

        pauseBtn.addEventListener('click', () => {
            if (!SpeechRecognition) return;
            if (!isPaused) {
                isPaused = true;
                recognition.stop();
                pauseBtn.innerText = "RESUME RECORDING";
                recordStatus.innerText = "⏸️ Recording PAUSED. Microphone input is frozen.";
            } else {
                isPaused = false;
                recognition.start();
                pauseBtn.innerText = "PAUSE RECORDING";
                recordStatus.innerText = "🎙️ Resumed: Listening... Speak clearly into your mic now.";
            }
        });

        resetBtn.addEventListener('click', () => {
            if (!SpeechRecognition) return;
            finalTranscript = "";
            liveTranscriptDiv.innerText = "Words will appear here instantly as you speak...";
            isPaused = false;
            pauseBtn.innerText = "PAUSE RECORDING";
            recordStatus.innerText = "🔄 Session wiped cleanly! Listening for fresh microphone streams...";
            try { recognition.stop(); } catch(e) {}
            setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300);
        });

        stopBtn.addEventListener('click', async () => {
            if (!SpeechRecognition) return;
            isPaused = false;
            recognition.stop();
            stopBtn.style.display = 'none';
            pauseBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            startBtn.style.display = 'inline-block';
            pauseBtn.innerText = "PAUSE RECORDING";
            await sendTranscriptToBackend(finalTranscript.trim());
        });

        // --- DISPATCH RAW PARSED TEXT TO BACKEND VIA SECURE JSON PAYLOAD ---
        async function sendTranscriptToBackend(textString) {
            recordStatus.innerText = "Analyzing text variables... Dispatching payload to active core pipeline.";
            
            const patientId = parseInt(document.getElementById('patientId').value);
            const userId = parseInt(document.getElementById('userId').value);
            const templateId = parseInt(templateSelect.value);
            const chosenModel = modelSelect.value;

            // 1. FIXED: Clean, short base URL with no string parameters hanging off the end
            const uploadUrl = `${BACKEND_URL}/api/sessions/process`;

            // 2. FIXED: Construct a standard JavaScript object matching the backend schema
            const jsonPayload = {
                patient_id: patientId,
                user_id: userId,
                template_id: templateId,
                model_name: chosenModel,
                raw_text: textString // 👈 The long voice transcript safely tucked inside the body!
            };

            try {
                const response = await fetch(uploadUrl, { 
                    method: "POST", 
                    headers: { 
                        "Content-Type": "application/json" // Tells the server to expect JSON data
                    },
                    body: JSON.stringify(jsonPayload) // 👈 Converts object to a clean string
                });
                
                if (!response.ok) throw new Error("Inference pipeline exception thrown.");
                const data = await response.json();
                
                const targetId = data.id || data.consultation_id;
                if (!targetId) throw new Error("No valid Consultation ID returned from server.");
                window.location.href = `/detail/${targetId}`;
            } catch (err) {
                alert("Processing Exception: " + err.message);
                recordStatus.innerText = "Analysis process aborted due to technical issues.";
            }
        }

                // --- FETCH SCHEMAS ON INITIALIZATION BOOT ---
        window.addEventListener('DOMContentLoaded', async () => {
            // 1. Fetch available templates
            try {
                const res = await fetch(`${BACKEND_URL}/api/templates`);
                if (res.ok) {
                    const templates = await res.json();
                    templateSelect.innerHTML = "";
                    templates.forEach((t, i) => {
                        const selectedAttr = (t.id === 1 || i === 0) ? "selected" : "";
                        templateSelect.innerHTML += `<option value="${t.id}" ${selectedAttr}>${t.title} (ID: ${t.id})</option>`;
                    });
                }
            } catch (e) { 
                console.log("Template fetch error: " + e); 
            }

            // 2. Fetch available models matching your custom path mapping parameters
            try {
                const modelRes = await fetch(`${BACKEND_URL}/models`); // Targets exact path layout
                if (modelRes.ok) {
                    const modelsData = await modelRes.json();
                    modelSelect.innerHTML = ""; 

                    // Render local Ollama models group
                    if (modelsData.ollama_models && modelsData.ollama_models.length > 0) {
                        const group = document.createElement('optgroup');
                        group.label = "--- Local Ollama GPU Models ---";
                        
                        modelsData.ollama_models.forEach(m => {
                            const opt = document.createElement('option');
                            opt.value = `ollama-${m}`; // 👈 CHANGE THIS from m to `ollama-${m}`
                            opt.innerText = `Ollama - ${m}`;
                            if (m.startsWith("llama3.1")) {
                                opt.selected = true;
                            }
                            group.appendChild(opt);
                        });
                        modelSelect.appendChild(group);
                    }

                    // Render Gemini cloud models group
                    if (modelsData.gemini_models && modelsData.gemini_models.length > 0) {
                        const group = document.createElement('optgroup');
                        group.label = "--- Cloud Google Gemini Models ---";
                        
                        modelsData.gemini_models.forEach(g => {
                            const opt = document.createElement('option');
                            opt.value = g;
                            opt.innerText = `Gemini - ${g}`;
                            group.appendChild(opt);
                        });
                        modelSelect.appendChild(group);
                    }
                }
            } catch (e) { 
                console.log("Model picker endpoint load error: " + e); 
            }
        });
    </script>
</body>
</html>
